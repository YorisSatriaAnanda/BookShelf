<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Noir Bookshelf</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css" />
  <script defer src="main.js"></script>
</head>

<body>
  <div class="app-container">
    <header>
      <div class="header-content">
        <h1>Noir <span>Bookshelf</span></h1>
        <p>A minimalist sanctuary for your literary collection.</p>
      </div>
    </header>

    <main>
      <div class="grid-layout">
        <!-- Top Section: Add and Search -->
        <div class="management-section">
          <section class="card add-book-section">
            <div class="section-header">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-plus-circle"><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="16"/><line x1="8" x2="16" y1="12" y2="12"/></svg>
              <h2>Tambah Buku Baru</h2>
            </div>
            <form id="bookForm" data-testid="bookForm">
              <div class="form-group">
                <label for="bookFormTitle">Judul</label>
                <input id="bookFormTitle" type="text" placeholder="Masukkan judul buku" required data-testid="bookFormTitleInput" />
              </div>
              <div class="form-group">
                <label for="bookFormAuthor">Penulis</label>
                <input id="bookFormAuthor" type="text" placeholder="Nama penulis" required data-testid="bookFormAuthorInput" />
              </div>
              <div class="form-group">
                <label for="bookFormYear">Tahun Terbit</label>
                <input id="bookFormYear" type="number" placeholder="Contoh: 2024" required data-testid="bookFormYearInput" />
              </div>
              <div class="form-group checkbox-group">
                <label class="custom-checkbox">
                  <input id="bookFormIsComplete" type="checkbox" data-testid="bookFormIsCompleteCheckbox" />
                  <span class="checkmark"></span>
                  Selesai dibaca
                </label>
              </div>
              <button id="bookFormSubmit" type="submit" data-testid="bookFormSubmitButton">
                <span>Masukkan Buku ke rak Belum selesai dibaca</span>
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-arrow-right"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
              </button>
            </form>
          </section>

          <section class="card search-book-section">
            <div class="section-header">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-search"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
              <h2>Cari Buku</h2>
            </div>
            <form id="searchBook" data-testid="searchBookForm">
              <div class="search-input-wrapper">
                <input id="searchBookTitle" type="text" placeholder="Cari berdasarkan judul..." data-testid="searchBookFormTitleInput" />
                <button id="searchSubmit" type="submit" data-testid="searchBookFormSubmitButton">
                  <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-search"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
                </button>
              </div>
            </form>
          </section>
        </div>

        <!-- Right/Bottom Section: Lists -->
        <div class="shelves-section">
          <section class="card incomplete-books-section">
            <div class="section-header">
              <div class="status-indicator incomplete"></div>
              <h2>Belum Selesai Dibaca</h2>
            </div>
            <div id="incompleteBookList" class="book-list" data-testid="incompleteBookList"></div>
          </section>

          <section class="card complete-books-section">
            <div class="section-header">
              <div class="status-indicator complete"></div>
              <h2>Selesai Dibaca</h2>
            </div>
            <div id="completeBookList" class="book-list" data-testid="completeBookList"></div>
          </section>
        </div>
      </div>
    </main>

    <footer>
      <p>&copy; 2024 Celestial Bookshelf. Designed with passion.</p>
    </footer>
  </div>
</body>

</html>
